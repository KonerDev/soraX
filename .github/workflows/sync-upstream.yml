# .github/workflows/sync-upstream.yml
name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/Rosemoe/sora-editor.git
          git fetch upstream main

      - name: Check for conflicts (dry run)
        id: conflict_check
        run: |
          git merge --no-commit --no-ff upstream/main || echo "HAS_CONFLICT=true" >> $GITHUB_OUTPUT
          git merge --abort 2>/dev/null || true

      - name: Merge if no conflicts
        if: steps.conflict_check.outputs.HAS_CONFLICT != 'true'
        run: |
          git merge upstream/main --ff-only || git merge upstream/main -m "chore: sync from upstream/main"
          git push origin main

      - name: Notify on conflict
        if: steps.conflict_check.outputs.HAS_CONFLICT == 'true'
        run: |
          echo "::warning::Merge conflict detected with upstream/main. Manual resolution required."
          exit 1